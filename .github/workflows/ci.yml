name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
  push:
    branches:
      - '**'
    tags:
      - "!*"
    paths-ignore:
      - '**.md'

jobs:
  test:
    name: Test

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - name: Npm install
        run: npm ci

      - name: Npm build
        run: npm run build

      - name: Running the tests
        run: npm run test
